plugins:
  - rubocop-rspec
  - rubocop-rake
  - rubocop-factory_bot

AllCops:
  NewCops: enable

Style/OneClassPerFile:
  Exclude:
    - spec/support/test_classes/**/*

Layout/LeadingCommentSpace:
  Enabled: false

# ========= RSpec ===========
RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 5

RSpec/ExampleLength:
  Max: 15

# ========= Metrics =========
Metrics/ClassLength:
  Max: 150

Metrics/MethodLength:
  Max: 25
